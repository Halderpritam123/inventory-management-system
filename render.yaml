services:
  - type: web
    name: inventory-backend
    env: python
    region: oregon
    plan: free
    root: backend
    pythonVersion: 3.11.16
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: CARGO_HOME
        value: /tmp/cargo
